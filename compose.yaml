services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    environment:
      POSTGRES_DB: c4platform
      POSTGRES_USER: c4user
      POSTGRES_PASSWORD: c4pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U c4user -d c4platform"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
